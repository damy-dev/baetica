<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <title>Post RRSS</title>
</head>
<body>
    <section class="main_container">
        
        <form id="posts" name="posts" action="http://localhost:5678/webhook-test/post" method="post" enctype="multipart/form-data">
            <h1>NUEVO POST</h1>
            <div id="upload_zone">
                <input id="file" type="file" name="image" accept="image/jpg, image/png" hidden>
                
                <div id="preview_container" hidden>
                    <img src="" alt="image_preview" id="image_preview" alt="Imagen cargada">
                </div>

                <div id="image_container">
                    <p id="upload_image">Haz click para elegir tu foto</p>
                </div>
            </div>

            <div id="description">
                <textarea type="text" name="description" placeholder="Comentario pié de foto..."></textarea>
            </div>
            
            <div id="rrss">
                <div id="instagram">
                    <label>
                        <input type="checkbox" name="ig" id="ig" value="ig" hidden>
                        <img class="logos" src="img/ig-logo.svg" alt="Logo Instagram">
                    </label>
                    <img class="check" src="img/check.svg" alt="Ok" hidden>
                </div>
   
                <div id="facebook">
                    <label>
                        <input type="checkbox" name="fb" id="fb" value="fb" hidden>
                        <img class="logos" src="img/fb-logo.svg" alt="Logo Facebook">
                    </label>
                    <img class="check" src="img/check.svg" alt="Ok" hidden>
                </div>
            </div>
            
            <button class="btnSumbit" type="submit" name="postBtn">ENVIAR POST</button>
            <h4 id="messages"></h4>
        </form>
        <button id="btnOpenClose" class="btnOpenClose" type="button">></button>
    </section>
    
</body>
</html>
