<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/scripts.js"></script>
    <title>RANKING FIP</title>
  </head>
  <body>
    <header>
      <h1 class="font-bold w-4/8">RANKING FIP</h1>
      <img src="img/QATAR-BIANCO.svg" class="w-1/8 ml-5" alt="qatar" />
      <img
        src="img/Cupra-fip-tour-2026-bianco.svg"
        class="w-1/8 ml-5"
        alt="cupra"
      />
      <div class="search w-4/8">
        <img class="lupa" src="img/lupa.svg" alt="lupa" />
        <select name="type" id="search_for">
          <option value="name">Nombre</option>
          <option value="nation">Nacionalidad</option>
          <option value="ranking">Ranking</option>
        </select>
        <input type="text" name="search" id="search" oninput="load()"/>
      </div>
    </header>
    <section class="masc_fem">

      <section id="masc_col">
        <h2 class="header_m">MASCULINO</h2>
        <button type="button" class="change_page" id="uparrow_male" onclick="changePage('male-')" >
          <img src="img/uparrow.svg" alt="flecha hacia arriba" width="30">
        </button>
        <div id="listMale"></div>
        <p class="loading" id="loading_m"></p>
        <button type="button" class="change_page" id="downarrow_male" onclick="changePage('male+')">
          <img src="img/downarrow.svg" alt="flecha hacia abajo" width="30">
        </button>
      </section>

      <section id="fem_col">
        <h2 class="header_f">FEMENINO</h2>
        <button type="button" class="change_page" id="uparrow_female" onclick="changePage('female-')">
          <img src="img/uparrow.svg" alt="flecha hacia abajo" width="30">
        </button>
        <div id="listFemale"></div>
        <p class="loading" id="loading_f"></p>
        <button type="button" class="change_page" id="downarrow_female" onclick="changePage('female+')">
          <img src="img/downarrow.svg" alt="flecha hacia abajo" width="30">
        </button>
      </section>

    </section>
  </body>
</html>
